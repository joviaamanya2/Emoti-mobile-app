name: emoti_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  provider: ^6.1.2

  # 100% Flutter 3.22 compatible
  fl_chart: ^0.65.0

  # For YouTube videos
  youtube_player_flutter: ^9.1.3
  flutter_inappwebview: ^6.1.0

  # FIXED — awesome_notifications 0.9.x supports latest Flutter + AGP 8+
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/health.png
    - assets/images/onboard1.jpg
    - assets/images/Get_started.png
    - assets/images/emoti connect.png
    - assets/images/password.png
    - assets/images/female.jpg
    - assets/images/male.jpg
    - assets/images/confused.png
    - assets/images/excited.png
    - assets/images/lonely.png
    - assets/images/sad.png
    - assets/images/tired.png
    - assets/images/stressed.png
